<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/webadb-tool/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bridge — WebUSB ADB console</title>
    <meta
      name="description"
      content="ブラウザから直接AndroidデバイスへAPKのインストールとファイル転送を行うWebUSB ADBツール"
    />
    <script type="module" crossorigin src="/webadb-tool/assets/index-BGFNQNjj.js"></script>
    <link rel="stylesheet" crossorigin href="/webadb-tool/assets/index-CqRM0qsZ.css">
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="topbar__brand">
          <span class="dot dot--idle" id="brandDot" aria-hidden="true"></span>
          <span class="topbar__title">bridge</span>
          <span class="topbar__subtitle">webusb adb console</span>
        </div>
        <div class="topbar__device" id="deviceInfo">未接続</div>
        <button class="btn btn--primary" id="connectBtn" type="button">
          デバイスを接続
        </button>
      </header>

        <main class="layout" id="layout" aria-disabled="true">
          <section class="card" aria-labelledby="installTitle">
            <div class="card__header">
              <span class="card__index">apk</span>
              <h2 class="card__title" id="installTitle">インストール</h2>
              <p class="card__desc">APKファイルを選択するか、ここにドロップしてください。</p>
            </div>

            <label class="dropzone" id="apkDropzone" for="apkInput">
              <input type="file" id="apkInput" accept=".apk" hidden />
              <svg class="dropzone__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M12 3v12m0 0-4-4m4 4 4-4M5 21h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span class="dropzone__label" id="apkLabel">.apk ファイル</span>
            </label>

              <label class="checkbox">
                <input type="checkbox" id="grantPermissions" checked />
                <span>すべての権限を自動許可する（-g）</span>
              </label>

              <label class="checkbox">
                <input type="checkbox" id="reinstall" checked />
                <span>既存アプリを上書きインストールする（-r）</span>
              </label>

            <button class="btn btn--accent" id="installBtn" type="button" disabled>
             インストール
            </button>
          </section>

          <section class="card" aria-labelledby="pushTitle">
            <div class="card__header">
              <span class="card__index">file</span>
              <h2 class="card__title" id="pushTitle">ファイル転送</h2>
              <p class="card__desc">ファイルまたはフォルダを選択するか、ここにドロップしてください。</p>
            </div>

                <div class="dropzone" id="pushDropzone">
                  <svg class="dropzone__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M12 3v12m0 0-4-4m4 4 4-4M5 21h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  <span class="dropzone__label" id="pushLabel">ファイル / フォルダ</span>
                </div>

                  <label class="checkbox">
                    <input type="checkbox" id="preserveFolderName" checked />
                    <span>選択フォルダを含める</span>
                  </label>

                  <label class="checkbox">
                    <input type="checkbox" id="syncRemotePath" checked />
                    <span>アプリとパスを同期する</span>
                  </label>

                  <label class="field">
                <span class="field__label">転送先パス</span>
                <input
                class="field__input"
                id="remotePath"
                type="text"
                spellcheck="false"
                placeholder="/sdcard/Android/data/com.example.app/files/"
                value="/sdcard/Android/data/com.example.app/files/"
                />
              </label>

              <div class="progress" id="pushProgress" hidden>
              <div class="progress__bar" id="pushProgressBar"></div>
            </div>

            <button class="btn btn--accent" id="pushBtn" type="button" disabled>
             転送
            </button>
          </section>

          <section class="card" aria-labelledby="appsTitle">
            <div class="card__header">
              <span class="card__index">app</span>
              <h2 class="card__title" id="appsTitle">アプリケーション</h2>
              <p class="card__desc">インストール済みサードパーティアプリ一覧。</p>
            </div>

            <button class="btn btn--small" id="refreshAppsBtn" type="button" disabled>
             リストを更新
            </button>

            <div id="appsList"></div>
          </section>

            <section class="card" aria-labelledby="wifiListTitle">
              <div class="card__header">
                <span class="card__index">wifi</span>
                <h2 class="card__title" id="wifiListTitle">ネットワーク</h2>
              </div>

              <div class="wifi-add-form">
                <label class="field">
                  <span class="field__label">SSID</span>
                  <input class="field__input" id="wifiSsidInput" type="text" spellcheck="false" placeholder="ネットワーク名" autocomplete="off" />
                </label>
                <label class="field">
                  <span class="field__label">暗号化</span>
                  <select class="field__input field__select" id="wifiSecuritySelect">
                    <option value="wpa3">WPA3</option>
                    <option value="wpa2">WPA2</option>
                    <option value="wep">WEP</option>
                  </select>
                </label>
                <label class="field">
                  <span class="field__label">パスワード</span>
                  <input class="field__input" id="wifiPasswordInput" type="text" spellcheck="false" placeholder="パスワード" autocomplete="off" />
                </label>
              </div>

              <button class="btn btn--accent" id="addWifiBtn" type="button" disabled>
              SSIDを追加
              </button>

                <span class="wifi-add-form__label">保存済みネットワーク一覧</span>
              <button class="btn btn--small" id="refreshWifiBtn" type="button" disabled>
              リストを更新
              </button>

              <div id="wifiList"></div>
            </section>

          <section class="card card--full" aria-labelledby="maintTitle">
            <div class="card__header">
              <span class="card__index">tools</span>
              <h2 class="card__title" id="maintTitle">メンテナンス</h2>
              <p class="card__desc">ショートカット機能。</p>
            </div>
            <div class="shortcuts-row">
              <div class="shortcuts-row__group">
                <button class="shortcut-btn" id="settingsBtn" type="button" disabled>設定</button>
                <button class="shortcut-btn" id="wifiBtn" type="button" disabled>WiFi</button>
              </div>
              <button class="shortcut-btn shortcut-btn--danger" id="rebootBtn" type="button" disabled>再起動</button>
            </div>
          </section>
        </main>

        <footer class="console" id="consoleFooter" role="contentinfo" aria-label="コンソールログ">
          <div class="console__bar">
            <span class="dot dot--red"></span>
            <span class="dot dot--yellow"></span>
            <span class="dot dot--green"></span>
            <span class="console__title">Console</span>
            <button class="console__clear" id="clearLog" type="button">clear</button>
          </div>
          <div class="console__body" id="log">
            <p class="console__line console__line--info">WebUSB ADB console — 右上の「デバイスを接続」から開始してください。</p>
          </div>
        </footer>
      </div>
  </body>
</html>
