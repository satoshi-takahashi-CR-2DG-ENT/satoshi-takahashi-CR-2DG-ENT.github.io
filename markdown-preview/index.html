	<!-- Mermaid は ESM のみ提供のため type="module" で読み込む。
	     非同期ロードのため window.mermaid へ代入し、
	     window.mermaidReady（Promise）でロード完了を後続コードへ通知する。
	     startOnLoad:false にして、描画タイミングは updatePreview 側で制御する。 -->
	<script type="module">
		import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11.16.0/dist/mermaid.esm.min.mjs";

		mermaid.initialize({ startOnLoad: false, theme: 'default' });
		window.mermaid = mermaid;
		window.dispatchEvent(new Event('mermaid:ready'));
	</script>
	<script>
		// mermaid ロード完了を待つための Promise。updatePreview から参照する。
		window.mermaidReady = new Promise((resolve) => {
			if (window.mermaid) { resolve(window.mermaid); return; }
			window.addEventListener('mermaid:ready', () => resolve(window.mermaid), { once: true });
		});

# タイトル

これはサンプルです。

## 機能

- **太字**や*斜体*のテキスト
- `インラインコード`
- リンク: [GitHub](https://github.com)

### リスト

1. 番号付きリスト
2. 2つ目の項目
3. 3つ目の項目

- 箇条書き
  - もう一つの項目

### 引用

> これは引用です。
> GitHubのプレビューと同じスタイルになっています。

### テーブル

| 左寄せ | 中央 | 右寄せ |
| :------- | :-------: | -------: |
| 1   | 2   | 3 |
| A   | B   | C |

### チェックボックス

- [x] チェックボックス
- [ ] 未チェックボックス

### サマリー

### アラート

> [!NOTE]
> ユーザーがコンテンツを読み飛ばしている場合でも知っておくべき有用な情報。

> [!TIP]
> 物事をより良く、またはより簡単に行うための役立つアドバイス。

> [!IMPORTANT]
> ユーザーが目標を達成するために知っておく必要がある重要な情報。

> [!WARNING]
> 問題を回避するために、ユーザーの即座の注意が必要な緊急情報。

> [!CAUTION]
> 特定のアクションのリスクまたはマイナスの結果についての警告。

> [!NOTE]
> アラート内でも `インラインコード` やコードブロックが正しく表示されます。
>
> ```javascript
> console.log("alert 内のコードブロック");
> ```

### コードブロック

```javascript
function hello() {
    console.log("Hello, World!");
}
```

```python
def greet(name):
    return f"Hello, {name}!"

print(greet("World"))
```

```mermaid

    A[開始] --> B{条件分岐}

```

```mermaid
sequenceDiagram
    participant U as ユーザー

```

		// 中身は mermaid ソースを HTML エスケープして入れる。
		// （mermaid.run() は要素の innerHTML を entityDecode して読むため、
		//  --> や < を含む図でも壊れないようエスケープ済みで保持するのが正しい。
		//  DOMPurify もエスケープ済みテキストなら安全に通過させる。）
		// mermaid 以外は false を返し、marked のデフォルト code レンダラーへ委譲する
		// （marked.use のフォールバック機構）。これで既存のコードブロック表示・
		// シンタックスハイライト（pre code セレクタ）の挙動を一切変えない。
		marked.use({

				icon: '<svg class="alert-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8-6.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM6.5 7.75A.75.75 0 0 1 7.25 7h1a.75.75 0 0 1 .75.75v2.75h.25a.75.75 0 0 1 0 1.5h-2a.75.75 0 0 1 0-1.5h.25v-2h-.25a.75.75 0 0 1-.75-.75ZM8 6a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"></path></svg>',
				class: 'caution',
				label: 'Caution'
			}
		};

		// アラート判定用パターン。marked の blockquote トークンの text（"> " 除去済み）の
		// 先頭が [!TYPE] かどうかを判定する。
		const ALERT_PATTERN = /^\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*/;

		// GitHub対応絵文字（:name: → Unicode）のマップ。
		const EMOJI_MAP = {
			'+1': '\u{1F44D}',
			'-1': '\u{1F44E}',
			heart: '\u2764\uFE0F',
			thumbsup: '\u{1F44D}',
			thumbsdown: '\u{1F44E}',
			o: '\u2B55',
			smile: '\u{1F604}',
			laughing: '\u{1F606}',
			weary: '\u{1F629}',
			sweat_smile: '\u{1F605}',
			heart_eyes: '\u{1F60D}',
			joy: '\u{1F602}',
			kissing: '\u{1F617}',
			rofl: '\u{1F923}',
			raised_hands: '\u{1F64C}',
			partying_face: '\u{1F973}',
			confused: '\u{1F615}',
			cold_sweat: '\u{1F630}',
			cry: '\u{1F622}',
			crown: '\u{1F451}',
			eyes: '\u{1F440}',
			heart_on_fire: '\u2764\uFE0F\u200D\u{1F525}',
			wastebasket: '\u{1F5D1}',
			see_no_evil: '\u{1F648}',
			deaf_person: '\u{1F9CF}',
			point_up: '\u261D',
			right_anger_bubble: '\u{1F5EF}',
			twisted_rightwards_arrows: '\u{1F500}',
			shield: '\u{1F6E1}\uFE0F',
			musical_note: '\u{1F3B5}',
			no_bell: '\u{1F515}',
			cyclone: '\u{1F300}',
			monkey: '\u{1F412}'
		};

		// 絵文字検出用パターン。EMOJI_START は start()（次候補位置の探索）用、
		// EMOJI_TOKEN は tokenizer 用に先頭アンカーで :name: を切り出す。
		// 文字クラスは GitHub のショートコードに合わせ - も許可（:+1: / :-1: 対応）。
		const EMOJI_START = /:[\w+-]+:/;
		const EMOJI_TOKEN = /^:([\w+-]+):/;

		// 絵文字（:name: → Unicode）を inline tokenizer で独立トークン化する拡張。
		// text/list/table/リンクテキスト等あらゆるインライン文脈で確実に変換され、
		// codespan・code（コードブロック）は別レベルのため対象外になる
		// （コード内の :smile: 等は変換されずに保持される）。
		// EMOJI_MAP に無い :name: は undefined を返して既定の tokenizer に委譲し、
		// 元テキストのまま残す。
		marked.use({
			extensions: [
				{
					name: 'emoji',
					level: 'inline',
					start(src) {
						return src.match(EMOJI_START)?.index;
					},
					tokenizer(src) {
						const match = EMOJI_TOKEN.exec(src);
						if (!match) return;
						const emoji = EMOJI_MAP[match[1]];
						if (!emoji) return;
						return {
							type: 'emoji',
							raw: match[0],
							emoji
						};
					},
					renderer(token) {
						return token.emoji;
					}
				}
			]
		});

		// GitHub アラート記法（> [!NOTE] 等）を marked のトークン処理へ組み込む拡張。
		// OSS 標準の marked-alert と同様、blockquote トークンを walkTokens で検査して
		// alert トークンへ変換する。本文パースは marked に委譲するため、アラート内の
		// コードブロック・インラインコード・複数段落・CRLF が正しく描画される。
		marked.use({
			walkTokens(token) {
				// アラート変換: blockquote の1行目が [!TYPE] のとき alert トークンへ。
				if (token.type !== 'blockquote') return;
				const match = token.text.match(ALERT_PATTERN);
				if (!match) return;

				const alertInfo = ALERT_TYPES[match[1]];
				token.type = 'alert';
				token.meta = alertInfo;

				// 先頭の [!TYPE] 表記を本文トークンから取り除く。
				// 1行目の段落トークンを見つけ、その raw/text と最初の子テキストを削る。
				const firstChild = token.tokens?.[0];
				if (firstChild && firstChild.type === 'paragraph') {
					firstChild.raw = firstChild.raw.replace(ALERT_PATTERN, '');
					firstChild.text = firstChild.text.replace(ALERT_PATTERN, '');
					const inner = firstChild.tokens?.[0];
					if (inner && inner.type === 'text') {
						inner.raw = inner.raw.replace(ALERT_PATTERN, '');
						inner.text = inner.text.replace(ALERT_PATTERN, '');
					}
					// 表記直後の改行トークン（breaks:true で入る <br>）を除去。
					if (firstChild.tokens?.[1] && firstChild.tokens[1].type === 'br') {
						firstChild.tokens.splice(1, 1);
					}
					// 1行目が空になった場合は段落トークンごと削除。
					if (firstChild.text === '') {
						token.tokens.shift();
					}
				}
			},
			extensions: [
				{
					name: 'alert',
					level: 'block',
					// walkTokens で type を 'alert' に差し替えるだけで tokenizer は不要。
					// renderer は既存の <div class="markdown-alert ..."> 構造を踏襲する。
					renderer(token) {
						const alertInfo = token.meta;
						const body = this.parser.parse(token.tokens);
						return `<div class="markdown-alert markdown-alert-${alertInfo.class}">
<div class="markdown-alert-title">${alertInfo.icon}${alertInfo.label}</div>
${body}</div>\n`;
					}
				}
			]
		});

		// marked が生成する HTML と、alert 拡張の renderer が組み立てる
		// アラート div / SVG アイコン / details・summary を保持しつつ、
		// script や on* 属性など危険な要素・属性を除去する。
		// USE_PROFILES で HTML と SVG を許可する。
		// ADD_ATTR のフットノート data-* は、DOMPurify がデフォルト（ALLOW_DATA_ATTR:true）で
		// 全 data-* を許可するため実際には冗長だが、意図を明示し将来 ALLOW_DATA_ATTR を
		// 無効化した場合の保険として残す。
		const SANITIZE_CONFIG = {
			USE_PROFILES: { html: true, svg: true },
			ADD_ATTR: ['data-footnoteref', 'data-footnotebackref']
		};

		// Markdown -> サニタイズ済み HTML の共通レンダリングパイプライン。
		// 1. 改行を LF に正規化（CRLF/CR を混入させても marked が正しく処理できるように）
		// 2. marked.parse: アラート（alert 拡張）・絵文字（emoji 拡張）・mermaid（code renderer）・
		//    フットノートを含めて全体を Markdown としてパース
		// 3. DOMPurify.sanitize: 危険な要素・属性を除去（最終段で一度だけ実行）
		function renderMarkdown(markdown) {
			const normalized = markdown.replace(/\r\n?/g, '\n');
			const rawHtml = marked.parse(normalized);
			return DOMPurify.sanitize(rawHtml, SANITIZE_CONFIG);
		}

		function updatePreview() {
			const markdown = document.getElementById('markdown-input').value;
			const preview = document.getElementById('preview');

			// Markdown パース -> サニタイズ（共通パイプライン）。
			// アラート・絵文字・mermaid・フットノートの変換は marked 内に統合済み。
			preview.innerHTML = renderMarkdown(markdown);

			// シンタックスハイライトはパース後に一括適用する。
			// （marked の highlight callback は使わない。アラート内コードは二重 parse されるため、
			//  DOM 生成後に highlight.js を適用する方式に統一している。）
			// mermaid 図は <pre class="mermaid">（code 要素なし）なのでこのセレクタに掛からず、
			// ハイライトと描画が競合しない。
			preview.querySelectorAll('pre code').forEach((block) => {
				hljs.highlightElement(block);
			});

			// Mermaid 図を描画する（sanitize 済み DOM に対して後段で実行）。
			// mermaid は ESM 非同期ロードのため window.mermaidReady を待つ。
			renderMermaid(preview);

		// - suppressErrors:true で、入力途中の不完全な図があってもクラッシュさせない。
		// - 各 updatePreview で innerHTML が再生成され data-processed が付いていないため、
		//   run() は毎回すべての .mermaid を描画し直す。

			if (!container.querySelector('.mermaid')) return;
			window.mermaidReady.then((mermaid) => {
				mermaid.run({
					nodes: container.querySelectorAll('.mermaid'),
					suppressErrors: true
				});
			});
		}

		function escapeHtml(str) {
			return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
		}

			a.click();
			URL.revokeObjectURL(url);
		}

		const lineNumbersEl = document.getElementById('line-numbers');
		let currentLineCount = 0;

		function renderLineNumbers() {
			const lines = editorInput.value.split('\n').length;
			if (lines === currentLineCount) return;
			currentLineCount = lines;
			lineNumbersEl.innerHTML = Array.from({ length: lines }, (_, i) => `<div class="line-number">${i + 1}</div>`).join('');
		}

		updatePreview();
		renderLineNumbers();

		// Debounce utility
		function debounce(fn, delay) {
			let timer;
			return (...args) => {
				clearTimeout(timer);
				timer = setTimeout(() => fn(...args), delay);
			};
		}

		// リアルタイムプレビュー + 行番号更新（debounce適用）
		editorInput.addEventListener('input', () => {
			renderLineNumbers(); // 行番号は即時更新
			debouncedUpdatePreview();
		});

		const debouncedUpdatePreview = debounce(updatePreview, 300);

		editorInput.addEventListener('scroll', () => {

		});
